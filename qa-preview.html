<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&family=Noto+Serif+JP:wght@700;900&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="figma-overrides.css">
  <link rel="stylesheet" href="scroll-fix.css">
  <link rel="stylesheet" href="figma-sections.css">
  <link rel="stylesheet" href="figma-remaining.css?v=1771f45">
</head>
<body>
  <main id="qa" class="page"></main>
  <script>
    const key = new URLSearchParams(location.search).get('section') || 'recommend';
    const selectors = { recommend: '.recommend', thanks: '.thanks', requirements: '.requirements' };
    fetch('index.html?v=21c0fcc').then(r => r.text()).then(html => {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const section = doc.querySelector(selectors[key]);
      if (section) document.querySelector('#qa').append(section);
    });
  </script>
</body>
</html>
